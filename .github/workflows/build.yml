name: Build & Pack Robust.Natives.Cef

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CEF_VERSION: "146.0.6"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            triple: x86_64-pc-windows-msvc
            webview-lib: robust_native_webview.dll
            helper-bin: cef-helper.exe
          - rid: linux-x64
            os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            webview-lib: librobust_native_webview.so
            helper-bin: cef-helper
          - rid: osx-arm64
            os: macos-26
            triple: aarch64-apple-darwin
            webview-lib: librobust_native_webview.dylib
            helper-bin: cef-helper
          - rid: osx-x64
            os: macos-26-intel
            triple: x86_64-apple-darwin
            webview-lib: librobust_native_webview.dylib
            helper-bin: cef-helper

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.rid }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout RobustToolbox
        uses: actions/checkout@v4
        with:
          repository: hry-gh/RobustToolbox
          ref: cef-rs
          path: RobustToolbox

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      # Windows: use short target dir to avoid MSVC path length issues
      - name: Set short target dir (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "CARGO_TARGET_DIR=C:/ct" >> $GITHUB_ENV

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ runner.os == 'Windows' && 'C:/ct' || 'RobustToolbox/native/target' }}
          key: cargo-${{ matrix.rid }}-${{ hashFiles('RobustToolbox/native/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.rid }}-

      - name: Build native libraries
        working-directory: RobustToolbox/native
        run: |
          cargo build --release --target ${{ matrix.triple }} -p robust-native-webview -p cef-helper

      - name: Collect artifacts
        shell: bash
        run: |
          python3 collect.py \
            --rid ${{ matrix.rid }} \
            --triple ${{ matrix.triple }} \
            --webview-lib ${{ matrix.webview-lib }} \
            --helper-bin ${{ matrix.helper-bin }} \
            --target-dir ${CARGO_TARGET_DIR:-RobustToolbox/native/target}

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.rid }}
          path: artifact/
          retention-days: 7

  pack:
    needs: build
    runs-on: ubuntu-latest
    name: Pack NuGet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: runtime-*

      - name: Assemble runtimes into sub-packages
        run: |
          for dir in artifacts/runtime-*; do
            rid=$(basename "$dir" | sed 's/^runtime-//')
            dest="nuget/$rid/runtimes/$rid/native"
            rm -rf "nuget/$rid/runtimes"
            mkdir -p "$dest"
            echo "Copying $rid..."
            cp -a "$dir/$rid/native/"* "$dest/"
          done

          echo "Layout:"
          for rid in win-x64 linux-x64 osx-arm64 osx-x64; do
            echo "--- $rid ---"
            find "nuget/$rid/runtimes" -maxdepth 3 -type f | head -20
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Pack all NuGet packages
        run: |
          mkdir -p out
          for proj in nuget/win-x64/*.csproj nuget/linux-x64/*.csproj nuget/osx-arm64/*.csproj nuget/osx-x64/*.csproj nuget/meta/*.csproj; do
            echo "Packing $proj..."
            dotnet pack "$proj" -o out
          done
          echo "Packages created:"
          ls -la out/*.nupkg

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: out/*.nupkg
          retention-days: 30

      - name: Publish to NuGet.org
        if: env.NUGET_API_KEY != ''
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          for pkg in out/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
